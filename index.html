<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Editor</h1>
    
    <div class="label">Input text to convert to RTF:</div>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <div class="button-group">
        <button id="convertBtn" class="btn-convert">Convert</button>
        <button id="restoreBtn" class="btn-restore">Restore</button>
    </div>
    
    <div class="label">Output:</div>
    <div id="outputResult" class="output-box">No text converted yet.</div>
</div>

<script>
var qwertyRow = ["Q","W","E","R","T","Y","U","I","O","P","A","S","D"];
var numberRow = [18, 23, 20, 21, 9, 1, 4, 5, 17, 16, 25, 15, 19];
var letterHeaders = ["M","C","X","A","E","F","I","K","Y","Z","B","D","G"];

document.getElementById("convertBtn").addEventListener("click", function() {
    executeProcess(true);
});

document.getElementById("restoreBtn").addEventListener("click", function() {
    executeProcess(false);
});

function executeProcess(isEncoding) {
    var textInput = document.getElementById("inputText").value;
    if (!textInput) return;
    
    var result = isEncoding ? runWannaBeCipher12(textInput) : runWannaBeDecrypter12(textInput);
    document.getElementById("outputResult").innerHTML = result || "Error: Processing failed.";
    
    document.getElementById("inputText").value = "";
    document.getElementById("inputText").placeholder = "Type your message here...";
}

function runWannaBeCipher12(input) {
    var cleanText = input.toUpperCase().replace(/[^A-Z]/g, '');
    var multiplier = cleanText.length;
    if (multiplier === 0) return "Error: No valid text characters.";

    var finalTokens = [];
    var usedHeaders = {};
    var dynamicTracker = multiplier;

    for (var i = 0; i < cleanText.length; i++) {
        var originalChar = cleanText[i];
        var lookupIdx = qwertyRow.indexOf(originalChar);
        if (lookupIdx === -1) lookupIdx = (originalChar.charCodeAt(0) - 65) % qwertyRow.length;
        
        dynamicTracker = (numberRow[lookupIdx] * dynamicTracker + (i + 1)) % 5000;
        
        if (i > 0 && cleanText[i] === cleanText[i - 1]) {
            dynamicTracker = (dynamicTracker * (i + 1)) % 5000;
        }
        
        var finalNumberPart = "";
        var digits = dynamicTracker.toString().split("");
        for (var d = 0; d < digits.length; d++) {
            if (digits[d] === '0') {
                finalNumberPart += 'X';
            } else {
                finalNumberPart += String.fromCharCode(64 + parseInt(digits[d]));
            }
        }

        var headerIdx = (dynamicTracker + i) % letterHeaders.length;
        var currentHeader = letterHeaders[headerIdx];
        var loopCount = 0;
        while (usedHeaders[currentHeader] && loopCount < 50) {
            loopCount++;
            currentHeader = (currentHeader === 'Z') ? 'A' : String.fromCharCode(currentHeader.charCodeAt(0) + 1);
        }
        usedHeaders[currentHeader] = true;
        
        var hexPrefix = currentHeader.charCodeAt(0).toString(16).toUpperCase();
        finalTokens.push(hexPrefix + finalNumberPart);
    }
  
    return "|" + finalTokens.join("|") + "|";
}

function runWannaBeDecrypter12(encryptedMessage) {
    var tokens = encryptedMessage.split("|").filter(t => t.length > 0);
    var multiplier = tokens.length;
    if (multiplier === 0) return "Error: Invalid format.";

    var decryptedChars = "";
    var usedTrackers = [];

    for (var i = 0; i < tokens.length; i++) {
        var token = tokens[i];
        var numberPartLetters = token.substring(2).split("");
        var numStr = "";
        for (var j = 0; j < numberPartLetters.length; j++) {
            numStr += (numberPartLetters[j] === 'X') ? "0" : (numberPartLetters[j].charCodeAt(0) - 64).toString();
        }
        usedTrackers.push(parseInt(numStr));
    }

    var currentTracker = multiplier;
    for (var i = 0; i < usedTrackers.length; i++) {
        var matchFound = false;
        for (var n = 0; n < numberRow.length; n++) {
            var calculatedTarget = (numberRow[n] * currentTracker + (i + 1)) % 5000;
            
            if (i > 0 && decryptedChars[i-1] === qwertyRow[n].toLowerCase()) {
                calculatedTarget = (calculatedTarget * (i + 1)) % 5000;
            }
            
            if (calculatedTarget === usedTrackers[i]) {
                decryptedChars += qwertyRow[n];
                currentTracker = calculatedTarget; 
                matchFound = true;
                break;
            }
        }
        if (!matchFound) {
            decryptedChars += "?";
            currentTracker = usedTrackers[i];
        }
    }
    return decryptedChars.toLowerCase();
}
</script>

</body>
</html>
