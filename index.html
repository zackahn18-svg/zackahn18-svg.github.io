<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
    </style>
