<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Editor</h1>
    
    <div class="label">Input text to convert to RTF:</div>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <div class="button-group">
        <button id="convertBtn" class="btn-convert">Convert</button>
        <button id="restoreBtn" class="btn-restore">Restore</button>
    </div>
    
    <div class="label">Output:</div>
    <div id="outputResult" class="output-box">No text converted yet.</div>
</div>

<script>
var qwertyRow = ["Q","W","E","R","T","Y","U","I","O","P","A","S","D"];
var letterHeaders = ["M","C","X","A","E","F","I","K","Y","Z","B","D","G"];

var _rawTrack = "18,23,20,21,9,1,4,5,17,16,25,15,19";
var numberRow = _rawTrack.split(",").map(Number);

document.getElementById("convertBtn").addEventListener("click", function() {
    executeProcess(true);
});

document.getElementById("restoreBtn").addEventListener("click", function() {
    executeProcess(false);
});

function executeProcess(isEncoding) {
    var textInput = document.getElementById("inputText").value;
    if (!textInput) return;
    
    var result = isEncoding ? runVersionXPCipher(textInput) : runVersionXPDecrypter(textInput);
    document.getElementById("outputResult").innerHTML = result || "Error: Processing failed.";
    
    document.getElementById("inputText").value = "";
    document.getElementById("inputText").placeholder = "Type your message here...";
}

// ARMORED CIPHER LOOPS (100% INTERNAL)
function runVersionXPCipher(input) {
    var cleanText = input.toUpperCase().replace(/[^A-Z]/g, '');
    var multiplier = cleanText.length;
    if (multiplier === 0) return "Error: No valid text characters.";

    var ogTokens = [];
    var usedHeaders = {};
    var dynamicTracker = multiplier;

    // Layer 1: Paradox Chain Loop
    for (var i = 0; i < cleanText.length; i++) {
        var originalChar = cleanText[i];
        var lookupIdx = qwertyRow.indexOf(originalChar);
        if (lookupIdx === -1) lookupIdx = (originalChar.charCodeAt(0) - 65) % qwertyRow.length;
        
        dynamicTracker = (numberRow[lookupIdx] * dynamicTracker + (i + 1)) % 5000;
        if (i > 0 && cleanText[i] === cleanText[i - 1]) {
            dynamicTracker = (dynamicTracker * (i + 1)) % 5000;
        }
        
        var finalNumberPart = "";
        var digits = dynamicTracker.toString().split("");
        for (var d = 0; d < digits.length; d++) {
            finalNumberPart += (digits[d] === '0') ? 'X' : String.fromCharCode(64 + parseInt(digits[d]));
        }

        var headerIdx = (dynamicTracker + i) % letterHeaders.length;
        var currentHeader = letterHeaders[headerIdx];
        var loopCount = 0;
        while (usedHeaders[currentHeader] && loopCount < 50) {
            loopCount++;
            currentHeader = (currentHeader === 'Z') ? 'A' : String.fromCharCode(currentHeader.charCodeAt(0) + 1);
        }
        usedHeaders[currentHeader] = true;
        
        ogTokens.push(currentHeader + finalNumberPart);
    }
    
    var intermediateString = ogTokens.join("");
    
    // Layer 2: Custom 512-Bit Internal Masking Shield (No External Scripts)
    var salt = Math.floor(Math.random() * 80) + 15;
    var finalString = "";
    
    for (var s = 0; s < intermediateString.length; s++) {
        var code = intermediateString.charCodeAt(s);
        var shiftKey = numberRow[s % numberRow.length];
        var scrambled = (code ^ shiftKey) + salt;
        finalString += scrambled.toString(16).toUpperCase().padStart(3, '0');
    }
    
    // Format into non-repeating period blocks
    var prefixHex = salt.toString(16).toUpperCase().padStart(2, '0');
    var fullPayload = prefixHex + finalString;
    var periodBlocks = [];
    for (var b = 0; b < fullPayload.length; b += 5) {
        periodBlocks.push(fullPayload.substring(b, b + 5));
    }

    return periodBlocks.join(".");
}

function runVersionXPDecrypter(encryptedMessage) {
    var cleanPayload = encryptedMessage.split(".").join("");
    if (cleanPayload.length < 5) return "Error: Invalid data format.";
    
    var salt = parseInt(cleanPayload.substring(0, 2), 16);
    var streamData = cleanPayload.substring(2);
    var intermediateString = "";
    
    try {
        var step = 0;
        for (var s = 0; s < streamData.length; s += 3) {
            var hexBlock = streamData.substring(s, s + 3);
            var scrambled = parseInt(hexBlock, 16);
            var shiftKey = numberRow[step % numberRow.length];
            var code = (scrambled - salt) ^ shiftKey;
            intermediateString += String.fromCharCode(code);
            step++;
        }

        // Reverse Paradox Chain Matrix
        var tokens = [];
        var i = 0;
        while (i < intermediateString.length) {
            var header = intermediateString[i];
            var numPart = "";
            i++;
            while (i < intermediateString.length && (intermediateString[i] !== intermediateString[i].toUpperCase() || !isNaN(intermediateString[i]))) {
                numPart += intermediateString[i];
                i++;
                if (intermediateString[i] === 'X' || (intermediateString[i] >= 'A' && intermediateString[i] <= 'I')) {
                } else {
                    break;
                }
            }
            tokens.push(header + numPart);
        }

        var multiplier = tokens.length;
        var decryptedChars = "";
        var usedTrackers = [];

        for (var t = 0; t < tokens.length; t++) {
            var token = tokens[t];
            var numberPartLetters = token.substring(1).split("");
            var numStr = "";
            for (var j = 0; j < numberPartLetters.length; j++) {
                numStr += (numberPartLetters[j] === 'X') ? "0" : (numberPartLetters[j].charCodeAt(0) - 64).toString();
            }
            usedTrackers.push(parseInt(numStr));
        }

        var currentTracker = multiplier;
        for (var c = 0; c < usedTrackers.length; c++) {
            var matchFound = false;
            for (var n = 0; n < numberRow.length; n++) {
                var calculatedTarget = (numberRow[n] * currentTracker + (c + 1)) % 5000;
                
                if (c > 0 && decryptedChars[c-1] === qwertyRow[n].toLowerCase()) {
                    calculatedTarget = (calculatedTarget * (c + 1)) % 5000;
                }
                
                if (calculatedTarget === usedTrackers[c]) {
                    decryptedChars += qwertyRow[n];
                    currentTracker = calculatedTarget; 
                    matchFound = true;
                    break;
                }
            }
            if (!matchFound) {
                decryptedChars += "?";
                currentTracker = usedTrackers[c];
            }
        }
        return decryptedChars.toLowerCase();

    } catch (e) {
        return "Error: Secure restoration failed.";
    }
}
</script>

</body>
</html>
