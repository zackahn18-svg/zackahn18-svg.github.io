<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Quantum-Shield 32K Engine</title>
<style>body{font-family:sans-serif;background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}

h2{margin:0 0 10px 0;font-size:22px;color:#58a6ff;}textarea{width:100%;height:100px;margin:10px 0;padding:10px;box-sizing:border-box;border-radius:6px;background:#0d1117;border:1px solid #30363d;color:#f0f6fc;resize:none;font-family:monospace;}

<body><div class="card"><h2>Shor-Resistant Hidden-IV Matrix Engine</h2><div id="st" style="font-family:monospace;font-size:12px;color:#7ee787;">Status: Operational</div>
<textarea id="inp" placeholder="Type text to encrypt or paste tokens to decrypt..."></textarea>
<button onclick="enc()">Encrypt</button><button class="dec" onclick="dec()">Decrypt</button>

const AB = BigInt(Alpha.length), S = new Array(256), IS = new Array(256);
(function init(){let p=1,q=1;do{p=p^(p<<1)^(p&0x80?0x11B:0);q^=q<<1;q^=q<<2;q^=q<<4;q^=q&0x80?0x09:0;let x=q^((q<<1)|(q>>7))^((q<<2)|(q>>6))^((q<<3)|(q>>5))^((q<<4)|(q>>4))^0x63;S[p&0xFF]=x&0xFF;}while(p!==1);S=0x63;for(let i=0;i<256;i++)IS[S[i]]=i;})();
function bStr(b){let n=BigInt(b),r="";if(n===0n)return Alpha;while(n>0n){r=Alpha[Number(n%AB)]+r;n/=AB;}return r;}
function bPrs(s){let v=0n;for(let i=0;i<s.length;i++)v=v*AB+BigInt(Math.max(0,Alpha.indexOf(s[i])));return v;}
function KSpace(t,offset){let p=[],h=5381n;for(let i=0;i<t.length;i++)h=((h<<5n)+h)+BigInt(t.charCodeAt(i));let s=h^offset;for(let i=0;i<4096;i++){s=(s*6364136223846793005n+1442695040888963407n)%18446744073709551616n;p.push(Number(s&0xFFn));}return p;}
function enc(){const v=document.getElementById('inp').value;if(!v)return;const b=new TextEncoder().encode(v);
const k=KSpace(v,0x9E3779B97F4A7C15n),iv=KSpace(v,0xC6A4A7935BD1E995n);let o=[],a=iv[0]^161;
for(let i=0;i<b.length;i++){let e=b[i]^k[i%4096]^iv[(i+17)%4096];let dynamicMix=((S[e]^k[(i+2048)%4096])<<2|e>>6)&0xFF;e=S[dynamicMix]^a;a=e;o.push(bStr(e));}
document.getElementById('out').innerText=o.join('梅');document.getElementById('st').innerText="Status: Hidden-IV Stream Compiled.";}
function dec(){const v=document.getElementById('inp').value.trim();if(!v)return;try{const t=v.split('梅'),len=t.length;let b=new Uint8Array(len);
let r="";for(let p=0;p<4;p++){let l=new Uint8Array(len),k=KSpace(r,0x9E3779B97F4A7C15n),iv=KSpace(r,0xC6A4A7935BD1E995n);let a=iv[0]^161;
for(let i=0;i<len;i++){let c=Number(bPrs(t[i])),e=IS[c^a];let targetByte=0;for(let m=0;m<256;m++){if(((S[m]^k[(i+2048)%4096])<<2|m>>6&0xFF)===e){targetByte=m;break;}}
l[i]=targetByte^k[i%4096]^iv[(i+17)%4096];a=c;}r=new TextDecoder().decode(l);}
document.getElementById('out').innerText=r;document.getElementById('st').innerText="Status: Decryption Verified.";}catch(e){alert("Error: Signature Verification Failure.");}}
</script></body></html>
