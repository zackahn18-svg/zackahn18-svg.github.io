<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Editor</h1>
    
    <div class="label">Input text to convert to RTF:</div>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <div class="button-group">
        <button id="convertBtn" class="btn-convert">Convert</button>
        <button id="restoreBtn" class="btn-restore">Restore</button>
    </div>
    
    <div class="label">Output:</div>
    <div id="outputResult" class="output-box">No text converted yet.</div>
</div>

<script>
// Your hardcoded sequence acts as the Master Seed phrase for key derivation
var _masterSeed = "18-23-20-21-9-1-4-5-17-16-25-15-19";

document.getElementById("convertBtn").addEventListener("click", async function() {
    await executeProcess(true);
});

document.getElementById("restoreBtn").addEventListener("click", async function() {
    await executeProcess(false);
});

async function executeProcess(isEncoding) {
    var textInput = document.getElementById("inputText").value;
    if (!textInput) return;
    
    var result;
    try {
        result = isEncoding ? await runQuantumCipher(textInput) : await runQuantumDecrypter(textInput);
    } catch (e) {
        result = "Error: Processing alignment failed.";
    }
    
    document.getElementById("outputResult").innerHTML = result;
    document.getElementById("inputText").value = "";
    document.getElementById("inputText").placeholder = "Type your message here...";
}

// Helper function to turn strings into bytes
function textToBytes(text) {
    return new TextEncoder().encode(text);
}

// Native hardware key generator (PBKDF2 with 100,000 computation rounds)
async function deriveCryptographicKey() {
    var baseKey = await crypto.subtle.importKey(
        "raw", 
        textToBytes(_masterSeed), 
        { name: "PBKDF2" }, 
        false, 
        ["deriveKey"]
    );
    
    var salt = textToBytes("WANNABE-XP-SALT-PROTECT");
    
    return await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

// Helper functions to change array structures into hexadecimal text format
function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToBytes(hex) {
    var bytes = new Uint8Array(hex.length / 2);
    for (var i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
    }
    return bytes;
}

// QUANTUM-RESISTANT VAULT CONVERT MODULE
async function runQuantumCipher(input) {
    var key = await deriveCryptographicKey();
    
    // Generate a completely fresh, random 12-byte vector for this specific string execution
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var encodedText = textToBytes(input);
    
    var encryptedBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        encodedText
    );
    
    var encryptedBytes = new Uint8Array(encryptedBuffer);
    
    // Combine the vector data and encrypted text bytes cleanly inside memory
    var fullPayload = new Uint8Array(iv.length + encryptedBytes.length);
    fullPayload.set(iv);
    fullPayload.set(encryptedBytes, iv.length);
    
    var rawHexPayload = bytesToHex(fullPayload);
    
    // Format output data into continuous non-repeating log chunks separated by periods (.)
    var periodBlocks = [];
    for (var b = 0; b < rawHexPayload.length; b += 6) {
        periodBlocks.push(rawHexPayload.substring(b, b + 6));
    }
    return periodBlocks.join(".");
}

// QUANTUM-RESISTANT VAULT RESTORE MODULE
async function runQuantumDecrypter(encryptedMessage) {
    try {
        var cleanHex = encryptedMessage.split(".").join("");
        var fullBytes = hexToBytes(cleanHex);
        
        // Extract the original 12-byte tracking array from the front of the text stream
        var iv = fullBytes.slice(0, 12);
        var encryptedBytes = fullBytes.slice(12);
        
        var key = await deriveCryptographicKey();
        
        var decryptedBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encryptedBytes
        );
        
        return new TextDecoder().decode(decryptedBuffer);
    } catch (e) {
        return "Error: Secure data verification failed.";
    }
}
</script>

</body>
</html>
