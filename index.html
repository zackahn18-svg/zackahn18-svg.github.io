<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <!-- FIX: Embedded Vector Camouflage Favicon to permanently clear 404 console errors -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='%230d6efd'%3E%3Cpath d='M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z'/%3E%3C/svg%3E">
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
        .status-indicator {
            font-size: 11px;
            color: #28a745;
            margin-top: -10px;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Editor</h1>
    <div id="ratchetStatus" class="status-indicator">Engine State: Initialized Base-Vector v15.0</div>
    
    <div class="label">Input text to convert to RTF:</div>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <div class="button-group">
        <button id="convertBtn" class="btn-convert">Convert</button>
        <button id="restoreBtn" class="btn-restore">Restore</button>
    </div>
    
    <div class="label">Output:</div>
    <div id="outputResult" class="output-box">No text converted yet.</div>
</div>

<script>
var STORAGE_KEY = "WANNABE_XP_RATCHET_STATE";
var DEFAULT_SEED = "18-23-20-21-9-1-4-5-17-16-25-15-19";

function getActiveRootSeed() {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) {
        localStorage.setItem(STORAGE_KEY, DEFAULT_SEED);
        return DEFAULT_SEED;
    }
    return stored;
}

async function advanceRootRatchet(currentSeed, varianceFactor) {
    var combinedInput = currentSeed + "-RATCHET-FACTOR-" + varianceFactor;
    var msgUint8 = new TextEncoder().encode(combinedInput);
    var hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    var newSeedHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
    
    localStorage.setItem(STORAGE_KEY, newSeedHex);
    document.getElementById("ratchetStatus").innerHTML = "Engine State: Ratcheted to Track " + newSeedHex.substring(0, 8);
}

document.getElementById("convertBtn").addEventListener("click", async function() {
    await executeProcess(true);
});

document.getElementById("restoreBtn").addEventListener("click", async function() {
    await executeProcess(false);
});

async function executeProcess(isEncoding) {
    var textInput = document.getElementById("inputText").value;
    if (!textInput) return;
    
    var result;
    try {
        result = isEncoding ? await runRatchetCipher(textInput) : await runRatchetDecrypter(textInput);
    } catch (e) {
        result = "Error: Secure transaction chain synchronization broken.";
    }
    
    document.getElementById("outputResult").innerHTML = result;
    document.getElementById("inputText").value = "";
    document.getElementById("inputText").placeholder = "Type your message here...";
}

function textToBytes(text) {
    return new TextEncoder().encode(text);
}

function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToBytes(hex) {
    var bytes = new Uint8Array(hex.length / 2);
    for (var i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
    }
    return bytes;
}

async function deriveWrappingKey(activeSeed) {
    var baseKey = await crypto.subtle.importKey(
        "raw", 
        textToBytes(activeSeed), 
        { name: "PBKDF2" }, 
        false, 
        ["deriveKey"]
    );
    return await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: textToBytes("RATCHET-WRAP-SALT"), iterations: 50000, hash: "SHA-256" },
        baseKey,
        { name: "AES-KW", length: 256 },
        false,
        ["wrapKey", "unwrapKey"]
    );
}

async function runRatchetCipher(input) {
    var activeSeed = getActiveRootSeed();
    var cleanText = input.toUpperCase().replace(/[^A-Z]/g, '');
    var multiplier = cleanText.length;
    if (multiplier === 0) multiplier = input.length;

    var massiveEphemeralKey = await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 },
        true,
        ["encrypt", "decrypt"]
    );

    var iv = crypto.getRandomValues(new Uint8Array(12));
    var encryptedDataBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        massiveEphemeralKey,
        textToBytes(input)
    );
    var encryptedDataBytes = new Uint8Array(encryptedDataBuffer);

    var wrappingKey = await deriveWrappingKey(activeSeed);
    var wrappedKeyBuffer = await crypto.subtle.wrapKey(
        "raw",
        massiveEphemeralKey,
        wrappingKey,
        "AES-KW"
    );
    var wrappedKeyBytes = new Uint8Array(wrappedKeyBuffer);

    var fullPayload = new Uint8Array(iv.length + wrappedKeyBytes.length + encryptedDataBytes.length);
    fullPayload.set(iv, 0);
    fullPayload.set(wrappedKeyBytes, iv.length);
    fullPayload.set(encryptedDataBytes, iv.length + wrappedKeyBytes.length);

    var rawHexPayload = bytesToHex(fullPayload);

    await advanceRootRatchet(activeSeed, multiplier);

    var periodBlocks = [];
    for (var b = 0; b < rawHexPayload.length; b += 6) {
        periodBlocks.push(rawHexPayload.substring(b, b + 6));
    }
    return periodBlocks.join(".");
}

async function runRatchetDecrypter(encryptedMessage) {
    var activeSeed = getActiveRootSeed();
    try {
        var cleanHex = encryptedMessage.split(".").join("");
        var fullBytes = hexToBytes(cleanHex);

        var iv = fullBytes.slice(0, 12);
        var wrappedKeyBytes = fullBytes.slice(12, 52);
        var encryptedDataBytes = fullBytes.slice(52);

        var wrappingKey = await deriveWrappingKey(activeSeed);
        var massiveEphemeralKey = await crypto.subtle.unwrapKey(
            "raw",
            wrappedKeyBytes,
            wrappingKey,
            "AES-KW",
            { name: "AES-GCM", length: 256 },
            true,
            ["decrypt"]
        );

        var decryptedBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            massiveEphemeralKey,
            encryptedDataBytes
        );

        var plaintextOutput = new TextDecoder().decode(decryptedBuffer);
        var cleanText = plaintextOutput.toUpperCase().replace(/[^A-Z]/g, '');
        var multiplier = cleanText.length;
        if (multiplier === 0) multiplier = plaintextOutput.length;

        await advanceRootRatchet(activeSeed, multiplier);

        return plaintextOutput;
    } catch (e) {
        return "Error: Secure chain desynchronized. Key alignment invalid.";
    }
}
</script>

</body>
</html>
