<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Editor</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #333333; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #f8f9fa; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            text-align: left; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { 
            color: #212529; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #ffffff; 
            color: #212529; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none; 
            outline: none; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        button { 
            flex: 1;
            color: #ffffff; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.2s;
        }
        .btn-convert { background-color: #0d6efd; }
        .btn-convert:hover { background-color: #0b5ed7; }
        .btn-restore { background-color: #6c757d; }
        .btn-restore:hover { background-color: #5c636a; }
        .label {
            color: #495057;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box { 
            background-color: #e9ecef; 
            border: 1px solid #ced4da; 
            padding: 12px; 
            border-radius: 4px; 
            word-wrap: break-word; 
            text-align: left; 
            font-size: 13px; 
            color: #212529; 
            min-height: 40px; 
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Editor</h1>
    
    <div class="label">Input text to convert to RTF:</div>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <div class="button-group">
        <button id="convertBtn" class="btn-convert">Convert</button>
        <button id="restoreBtn" class="btn-restore">Restore</button>
    </div>
    
    <div class="label">Output:</div>
    <div id="outputResult" class="output-box">No text converted yet.</div>
</div>

<script>
// YOUR IMMUTABLE SECURE ROOT MATRIX SEED
var _ogRootSeed = "18-23-20-21-9-1-4-5-17-16-25-15-19";

document.getElementById("convertBtn").addEventListener("click", async function() {
    await executeProcess(true);
});

document.getElementById("restoreBtn").addEventListener("click", async function() {
    await executeProcess(false);
});

async function executeProcess(isEncoding) {
    var textInput = document.getElementById("inputText").value;
    if (!textInput) return;
    
    var result;
    try {
        result = isEncoding ? await runDynamicEphemeralCipher(textInput) : await runDynamicEphemeralDecrypter(textInput);
    } catch (e) {
        result = "Error: Secure transaction synchronization broken.";
    }
    
    document.getElementById("outputResult").innerHTML = result;
    document.getElementById("inputText").value = "";
    document.getElementById("inputText").placeholder = "Type your message here...";
}

function textToBytes(text) {
    return new TextEncoder().encode(text);
}

function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToBytes(hex) {
    var bytes = new Uint8Array(hex.length / 2);
    for (var i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
    }
    return bytes;
}

// Generates an airtight master wrapping key from your OG number layout
async function deriveWrappingKey() {
    var baseKey = await crypto.subtle.importKey(
        "raw", 
        textToBytes(_ogRootSeed), 
        { name: "PBKDF2" }, 
        false, 
        ["deriveKey"]
    );
    return await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: textToBytes("KEY-WRAP-SALT"), iterations: 50000, hash: "SHA-256" },
        baseKey,
        { name: "AES-KW", length: 256 },
        false,
        ["wrapKey", "unwrapKey"]
    );
}

// EPHEMERAL HYPER-ENCRYPT CORE ENGINE
async function runDynamicEphemeralCipher(input) {
    // 1. Generate a massive, completely random 256-bit ephemeral key from scratch
    var massiveEphemeralKey = await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 },
        true,
        ["encrypt", "decrypt"]
    );

    // 2. Encrypt the plaintext input data with our massive random key
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var encryptedDataBuffer = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        massiveEphemeralKey,
        textToBytes(input)
    );
    var encryptedDataBytes = new Uint8Array(encryptedDataBuffer);

    // 3. Encapsulate (wrap) the massive random key using your permanent OG layout seed key
    var wrappingKey = await deriveWrappingKey();
    var wrappedKeyBuffer = await crypto.subtle.wrapKey(
        "raw",
        massiveEphemeralKey,
        wrappingKey,
        "AES-KW"
    );
    var wrappedKeyBytes = new Uint8Array(wrappedKeyBuffer);

    // 4. Compact everything into a single aligned memory byte array
    var fullPayload = new Uint8Array(iv.length + wrappedKeyBytes.length + encryptedDataBytes.length);
    fullPayload.set(iv, 0);
    fullPayload.set(wrappedKeyBytes, iv.length);
    fullPayload.set(encryptedDataBytes, iv.length + wrappedKeyBytes.length);

    var rawHexPayload = bytesToHex(fullPayload);

    // 5. Output data parsed cleanly into 6-character segments split by dots (.)
    var periodBlocks = [];
    for (var b = 0; b < rawHexPayload.length; b += 6) {
        periodBlocks.push(rawHexPayload.substring(b, b + 6));
    }
    return periodBlocks.join(".");
}

// EPHEMERAL REVERSE DECONSTRUCT ENGINE
async function runDynamicEphemeralDecrypter(encryptedMessage) {
    try {
        var cleanHex = encryptedMessage.split(".").join("");
        var fullBytes = hexToBytes(cleanHex);

        // Extract byte boundaries
        var iv = fullBytes.slice(0, 12);
        // AES-KW wrapping outputs a fixed 40 bytes for a 256-bit key size
        var wrappedKeyBytes = fullBytes.slice(12, 52);
        var encryptedDataBytes = fullBytes.slice(52);

        // 1. Recover the massive ephemeral key using your OG layout key map
        var wrappingKey = await deriveWrappingKey();
        var massiveEphemeralKey = await crypto.subtle.unwrapKey(
            "raw",
            wrappedKeyBytes,
            wrappingKey,
            "AES-KW",
            { name: "AES-GCM", length: 256 },
            true,
            ["decrypt"]
        );

        // 2. Unlock the message text payload using the verified ephemeral key
        var decryptedBuffer = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            massiveEphemeralKey,
            encryptedDataBytes
        );

        return new TextDecoder().decode(decryptedBuffer);
    } catch (e) {
        return "Error: Secure data verification failed.";
    }
}
</script>

</body>
</html>
